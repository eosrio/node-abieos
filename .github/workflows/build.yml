name: Node.js Addon with CMake

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x, 25.x]
      fail-fast: false

    steps:
    # Checkout repo and submodules
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Cache CMake build files
    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          build
          ~/.cmake
        key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'abieos/**') }}
        restore-keys: |
          ${{ runner.os }}-cmake-

    # Setup Node.js
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # Install dependencies
    - name: Install dependencies
      run: npm ci

    # Build native module
    - name: Build Linux native module
      run: npm run build:linux

    # Build TypeScript
    - name: Build TypeScript
      run: npm run build

    # Run tests
    - name: Run tests
      run: npm test

    - name: Upload linux-x64 prebuilt
      if: matrix.node-version == '24.x'
      uses: actions/upload-artifact@v4
      with:
        name: abieos-linux-x64
        path: lib/abieos-linux-x64.node
        if-no-files-found: error

    - name: Run coverage tests
      if: matrix.node-version == '22.x'
      run: npm run test:coverage

    - name: Upload coverage to Coveralls
      if: matrix.node-version == '22.x'
      uses: coverallsapp/github-action@v2
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

    # Upload build artifacts on failure for debugging
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-node-${{ matrix.node-version }}
        path: |
          build/**/*.log
          npm-debug.log*
        if-no-files-found: ignore

  bun-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          build
          ~/.cmake
        key: ${{ runner.os }}-cmake-bun-${{ hashFiles('CMakeLists.txt', 'abieos/**') }}
        restore-keys: |
          ${{ runner.os }}-cmake-bun-

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    # Bun needs Node.js for cmake-js (node-gyp dependency)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Install dependencies
      run: bun install

    - name: Build Linux native module
      run: bun run build:linux

    - name: Build TypeScript
      run: bun run build

    - name: Run tests
      run: bun run test

    # Upload build artifacts on failure for debugging
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-bun
        path: |
          build/**/*.log
        if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSYS2 (MinGW-w64)
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-ninja

    - name: Put MinGW-w64 on PATH
      shell: msys2 {0}
      run: echo "$(cygpath -w /mingw64/bin)" >> "$GITHUB_PATH"

    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Windows native module (MinGW-w64)
      run: npm run build:win

    - name: Build TypeScript
      run: npm run build

    - name: Run tests
      run: npm test

    - name: Upload win32-x64 prebuilt
      uses: actions/upload-artifact@v4
      with:
        name: abieos-win32-x64
        path: lib/abieos-win32-x64.node
        if-no-files-found: error

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-windows
        path: |
          build/**/*.log
        if-no-files-found: ignore

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build macOS native module
      run: npm run build:mac

    - name: Build TypeScript
      run: npm run build

    - name: Run tests
      run: npm test

    - name: Upload darwin-${{ matrix.arch }} prebuilt
      uses: actions/upload-artifact@v4
      with:
        name: abieos-darwin-${{ matrix.arch }}
        path: lib/abieos-darwin-${{ matrix.arch }}.node
        if-no-files-found: error

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-macos-${{ matrix.arch }}
        path: |
          build/**/*.log
        if-no-files-found: ignore
